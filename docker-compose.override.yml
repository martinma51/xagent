# Local development override: build backend & frontend from this checkout
# instead of pulling the prebuilt images from Docker Hub.
#
# `docker compose` automatically merges this file with docker-compose.yml.
# Use it whenever you want to test local source changes (the curated
# ability catalog feature, for example).
#
#   docker compose build               # build local images
#   docker compose up -d --build       # build + start
#   docker compose down                # tear down to switch back
#
# To go back to the published images, replace the contents with
# `services: {}` or delete this file.

services:
  backend:
    image: xagent-backend:local
    build:
      context: .
      dockerfile: docker/Dockerfile.backend

  frontend:
    image: xagent-frontend:local
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
